openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: me
    description: Current authenticated user
  - name: team
    description: Team and roles
  - name: cvs
    description: User CV uploads
  - name: project
    description: Project configuration (T0, etc.)
  - name: storage
    description: Object storage (presigned uploads, downloads)
  - name: admin
    description: PM-only administrative configuration
  - name: kanban
    description: Operational Kanban board
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Get current authenticated user (with roles + CV)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberMe"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/display-name:
    patch:
      operationId: updateMyDisplayName
      tags: [me]
      summary: Update my display name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisplayNameInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberMe"

  /me/notifications:
    patch:
      operationId: updateMyNotificationPrefs
      tags: [me]
      summary: Update my email notification preferences (opt-in/opt-out)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPrefsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberMe"

  /me/roles:
    get:
      operationId: getMyRoles
      tags: [me]
      summary: List my role assignments
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
    put:
      operationId: setMyRoles
      tags: [me]
      summary: Replace my role assignments (full set)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RolesInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /me/cv:
    get:
      operationId: getMyCv
      tags: [cvs]
      summary: Get metadata of my CV
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cv"
        "404":
          description: No CV uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: setMyCv
      tags: [cvs]
      summary: Save or replace my CV (after uploading to object storage)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CvInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cv"
    delete:
      operationId: deleteMyCv
      tags: [cvs]
      summary: Remove my CV
      responses:
        "204":
          description: No content

  /team/members:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: List all registered team members (with roles + CV info)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"

  /team/roles:
    get:
      operationId: listAvailableRoles
      tags: [team]
      summary: List of all role definitions available in the project
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleDefinition"

  /team/summary:
    get:
      operationId: getTeamSummary
      tags: [team]
      summary: Team summary (counts of members, roles filled, CVs uploaded, role coverage)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamSummary"

  /project/config:
    get:
      operationId: getProjectConfig
      tags: [project]
      summary: Get project config (optional T0 / start date, etc.)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectConfig"
    patch:
      operationId: updateProjectConfig
      tags: [project]
      summary: Update project config (set or clear T0 start date)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectConfigUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectConfig"

  /admin/notification-recipients:
    get:
      operationId: listNotificationRecipients
      tags: [admin]
      summary: List fixed notification recipients (PM only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationRecipient"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addNotificationRecipient
      tags: [admin]
      summary: Add a fixed notification recipient (PM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationRecipientInput"
      responses:
        "200":
          description: Already existed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationRecipient"
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationRecipient"

  /admin/notification-recipients/test:
    post:
      operationId: testNotificationRecipients
      tags: [admin]
      summary: Send a test notification to the current recipient list (PM only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestNotificationResult"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/notification-log:
    get:
      operationId: listNotificationLog
      tags: [admin]
      summary: List recent team notification log entries (PM only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationLogEntry"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/notification-recipients/{email}:
    delete:
      operationId: deleteNotificationRecipient
      tags: [admin]
      summary: Remove a fixed notification recipient (PM only)
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No content

  /kanban/columns:
    get:
      operationId: listKanbanColumns
      tags: [kanban]
      summary: List Kanban columns in display order
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KanbanColumn"

  /kanban/cards:
    get:
      operationId: listKanbanCards
      tags: [kanban]
      summary: List all Kanban cards
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KanbanCard"
    post:
      operationId: createKanbanCard
      tags: [kanban]
      summary: Create a Kanban card
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KanbanCardCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KanbanCard"

  /kanban/cards/{id}:
    patch:
      operationId: updateKanbanCard
      tags: [kanban]
      summary: Update a Kanban card (any team member)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KanbanCardUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KanbanCard"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteKanbanCard
      tags: [kanban]
      summary: Delete a Kanban card (creator or PM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No content
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /kanban/cards/{id}/move:
    post:
      operationId: moveKanbanCard
      tags: [kanban]
      summary: Move a card to a column at a given position (atomic reorder)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KanbanCardMove"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KanbanCard"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned URL to upload a file to object storage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrl"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    RoleDefinition:
      type: object
      required: [id, label, description]
      properties:
        id:
          type: string
        label:
          type: string
        description:
          type: string

    Cv:
      type: object
      required: [fileName, contentType, objectPath, sizeBytes, uploadedAt]
      properties:
        fileName:
          type: string
        contentType:
          type: string
        objectPath:
          type: string
        sizeBytes:
          type: integer
        uploadedAt:
          type: string
          format: date-time

    CvInput:
      type: object
      required: [fileName, contentType, objectPath, sizeBytes]
      properties:
        fileName:
          type: string
          minLength: 1
        contentType:
          type: string
          minLength: 1
        objectPath:
          type: string
          minLength: 1
        sizeBytes:
          type: integer
          minimum: 0

    Member:
      type: object
      required: [id, email, displayName, roles, joinedAt, hasCv]
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        roles:
          type: array
          items:
            type: string
        joinedAt:
          type: string
          format: date-time
        hasCv:
          type: boolean
        cv:
          oneOf:
            - $ref: "#/components/schemas/Cv"
            - type: "null"

    MemberMe:
      type: object
      required:
        [id, email, displayName, roles, joinedAt, hasCv, emailNotificationsOptOut]
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        roles:
          type: array
          items:
            type: string
        joinedAt:
          type: string
          format: date-time
        hasCv:
          type: boolean
        cv:
          oneOf:
            - $ref: "#/components/schemas/Cv"
            - type: "null"
        emailNotificationsOptOut:
          type: boolean

    NotificationPrefsInput:
      type: object
      required: [emailNotificationsOptOut]
      properties:
        emailNotificationsOptOut:
          type: boolean

    DisplayNameInput:
      type: object
      required: [displayName]
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 120

    RolesInput:
      type: object
      required: [roles]
      properties:
        roles:
          type: array
          items:
            type: string

    RoleCoverage:
      type: object
      required: [roleId, label, count, assignees]
      properties:
        roleId:
          type: string
        label:
          type: string
        count:
          type: integer
        assignees:
          type: array
          items:
            type: string

    TeamSummary:
      type: object
      required: [memberCount, cvCount, rolesFilled, totalRoles, coverage]
      properties:
        memberCount:
          type: integer
        cvCount:
          type: integer
        rolesFilled:
          type: integer
        totalRoles:
          type: integer
        coverage:
          type: array
          items:
            $ref: "#/components/schemas/RoleCoverage"

    ProjectConfig:
      type: object
      required: [startDate, updatedAt]
      properties:
        startDate:
          type: ["string", "null"]
          format: date
        updatedAt:
          type: string
          format: date-time

    ProjectConfigUpdate:
      type: object
      properties:
        startDate:
          type: ["string", "null"]
          format: date

    NotificationRecipient:
      type: object
      required: [email, createdAt]
      properties:
        email:
          type: string
        addedBy:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    TestNotificationResult:
      type: object
      required: [status, recipientCount, recipients, message]
      properties:
        status:
          type: string
          enum: [sent, no_provider, no_recipients, failed]
        recipientCount:
          type: integer
        recipients:
          type: array
          items:
            type: string
        message:
          type: string

    NotificationLogEntry:
      type: object
      required: [id, eventKind, recipients, recipientCount, status, createdAt]
      properties:
        id:
          type: string
        eventKind:
          type: string
        recipients:
          type: array
          items:
            type: string
        recipientCount:
          type: integer
        status:
          type: string
          enum: [sent, no_provider, no_recipients, failed]
        providerMessage:
          type: ["string", "null"]
        triggeredBy:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    NotificationRecipientInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          minLength: 3

    KanbanColumn:
      type: object
      required: [key, label, sortOrder]
      properties:
        key:
          type: string
        label:
          type: string
        sortOrder:
          type: integer

    KanbanPriority:
      type: string
      enum: [alta, media, baja]

    KanbanCard:
      type: object
      required:
        [id, title, description, columnKey, position, assignedRoles, priority, createdBy, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        columnKey:
          type: string
        position:
          type: integer
        phaseId:
          type: ["string", "null"]
        assignedRoles:
          type: array
          items:
            type: string
        priority:
          $ref: "#/components/schemas/KanbanPriority"
        dueDate:
          type: ["string", "null"]
          format: date
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    KanbanCardCreate:
      type: object
      required: [title, columnKey]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        columnKey:
          type: string
          minLength: 1
        phaseId:
          type: ["string", "null"]
        assignedRoles:
          type: array
          items:
            type: string
        priority:
          $ref: "#/components/schemas/KanbanPriority"
        dueDate:
          type: ["string", "null"]
          format: date

    KanbanCardUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        phaseId:
          type: ["string", "null"]
        assignedRoles:
          type: array
          items:
            type: string
        priority:
          $ref: "#/components/schemas/KanbanPriority"
        dueDate:
          type: ["string", "null"]
          format: date

    KanbanCardMove:
      type: object
      required: [columnKey, position]
      properties:
        columnKey:
          type: string
          minLength: 1
        position:
          type: integer
          minimum: 0

    UploadRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    UploadUrl:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
