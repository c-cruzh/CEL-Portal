openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: me
    description: Current authenticated user
  - name: team
    description: Team and roles
  - name: cvs
    description: User CV uploads
  - name: project
    description: Project configuration (T0, etc.)
  - name: storage
    description: Object storage (presigned uploads, downloads)
  - name: admin
    description: PM-only administrative configuration
  - name: kanban
    description: Operational Kanban board
  - name: milestones
    description: Project milestones / calendar (relative to T0)
  - name: decisions
    description: Outstanding decision board
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Get current authenticated user (with roles + CV)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberMe"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/display-name:
    patch:
      operationId: updateMyDisplayName
      tags: [me]
      summary: Update my display name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisplayNameInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberMe"

  /me/notifications:
    patch:
      operationId: updateMyNotificationPrefs
      tags: [me]
      summary: Update my email notification preferences (opt-in/opt-out)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPrefsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberMe"

  /me/roles:
    get:
      operationId: getMyRoles
      tags: [me]
      summary: List my role assignments
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
    put:
      operationId: setMyRoles
      tags: [me]
      summary: Replace my role assignments (full set)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RolesInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /me/cv:
    get:
      operationId: getMyCv
      tags: [cvs]
      summary: Get metadata of my CV
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cv"
        "404":
          description: No CV uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: setMyCv
      tags: [cvs]
      summary: Save or replace my CV (after uploading to object storage)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CvInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cv"
    delete:
      operationId: deleteMyCv
      tags: [cvs]
      summary: Remove my CV
      responses:
        "204":
          description: No content

  /team/members:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: List all registered team members (with roles + CV info)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"

  /team/members/{userId}:
    patch:
      operationId: adminUpdateMember
      tags: [team]
      summary: Update another member's display name and/or roles (PM only)
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberAdminInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "403":
          description: Forbidden (not a PM)
        "404":
          description: Member not found

  /team/roles:
    get:
      operationId: listAvailableRoles
      tags: [team]
      summary: List of all role definitions available in the project
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleDefinition"

  /team/summary:
    get:
      operationId: getTeamSummary
      tags: [team]
      summary: Team summary (counts of members, roles filled, CVs uploaded, role coverage)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamSummary"

  /project/config:
    get:
      operationId: getProjectConfig
      tags: [project]
      summary: Get project config (optional T0 / start date, etc.)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectConfig"
    patch:
      operationId: updateProjectConfig
      tags: [project]
      summary: Update project config (set or clear T0 start date)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectConfigUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectConfig"

  /admin/notification-recipients:
    get:
      operationId: listNotificationRecipients
      tags: [admin]
      summary: List fixed notification recipients (PM only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationRecipient"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addNotificationRecipient
      tags: [admin]
      summary: Add a fixed notification recipient (PM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationRecipientInput"
      responses:
        "200":
          description: Already existed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationRecipient"
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationRecipient"

  /admin/notification-recipients/test:
    post:
      operationId: testNotificationRecipients
      tags: [admin]
      summary: Send a test notification to the current recipient list (PM only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestNotificationResult"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/notification-log:
    get:
      operationId: listNotificationLog
      tags: [admin]
      summary: List recent team notification log entries (PM only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationLogEntry"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/notification-recipients/{email}:
    delete:
      operationId: deleteNotificationRecipient
      tags: [admin]
      summary: Remove a fixed notification recipient (PM only)
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No content

  /kanban/columns:
    get:
      operationId: listKanbanColumns
      tags: [kanban]
      summary: List Kanban columns in display order
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KanbanColumn"

  /milestones:
    get:
      operationId: listMilestones
      tags: [milestones]
      summary: List all project milestones (read for all authenticated users)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"
    post:
      operationId: createMilestone
      tags: [milestones]
      summary: Create a custom milestone (PM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /kanban/cards:
    get:
      operationId: listKanbanCards
      tags: [kanban]
      summary: List all Kanban cards
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KanbanCard"
    post:
      operationId: createKanbanCard
      tags: [kanban]
      summary: Create a Kanban card
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KanbanCardCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KanbanCard"

  /kanban/cards/{id}:
    patch:
      operationId: updateKanbanCard
      tags: [kanban]
      summary: Update a Kanban card (any team member)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KanbanCardUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KanbanCard"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteKanbanCard
      tags: [kanban]
      summary: Delete a Kanban card (creator or PM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No content
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /milestones/{id}:
    patch:
      operationId: updateMilestone
      tags: [milestones]
      summary: Update a custom milestone (PM only). System milestones cannot be updated.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMilestone
      tags: [milestones]
      summary: Delete a custom milestone (PM only). System milestones cannot be deleted.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No content
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /kanban/cards/{id}/move:
    post:
      operationId: moveKanbanCard
      tags: [kanban]
      summary: Move a card to a column at a given position (atomic reorder)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KanbanCardMove"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KanbanCard"

  /calendar/export.ics:
    get:
      operationId: exportCalendarIcs
      tags: [milestones]
      summary: Download an iCalendar (.ics) file with all project milestones (one-shot, authenticated)
      responses:
        "200":
          description: iCalendar file
          content:
            text/calendar:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /calendar/feed-url:
    get:
      operationId: getCalendarFeedUrl
      tags: [milestones]
      summary: Return the public iCalendar subscription URL (token-protected)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarFeedUrl"

  /documents/folders:
    get:
      operationId: listDocumentFolders
      tags: [documents]
      summary: List document folders available in the repository
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentFolder"
    post:
      operationId: createDocumentFolder
      tags: [documents]
      summary: Create a new document folder (PM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentFolderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentFolder"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents (filterable)
      parameters:
        - name: folder
          in: query
          required: false
          schema:
            type: string
        - name: phaseId
          in: query
          required: false
          schema:
            type: string
        - name: uploadedBy
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: includeInactive
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create a document entry (after uploading file to object storage). Versions when (name, folder) match.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    put:
      operationId: updateDocument
      tags: [documents]
      summary: Update document metadata (PM or uploader)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document (PM or original uploader)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No content
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/download:
    get:
      operationId: getDocumentDownloadUrl
      tags: [documents]
      summary: Get a short-lived signed download URL for the document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDownloadUrl"

  /decisions:
    get:
      operationId: listDecisions
      tags: [decisions]
      summary: List decisions (with optional filters)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_analysis, resolved, cancelled]
        - name: ownerUserId
          in: query
          schema:
            type: string
        - name: ownerRole
          in: query
          schema:
            type: string
        - name: phase
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Decision"
    post:
      operationId: createDecision
      tags: [decisions]
      summary: Create a new decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"

  /decisions/{id}:
    get:
      operationId: getDecision
      tags: [decisions]
      summary: Get a decision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateDecision
      tags: [decisions]
      summary: Update a decision (title, context, owner, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"
    delete:
      operationId: deleteDecision
      tags: [decisions]
      summary: Delete a decision (creator or PM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No content
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /decisions/{id}/resolve:
    post:
      operationId: resolveDecision
      tags: [decisions]
      summary: Mark a decision as resolved (owner or PM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionResolveInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /decisions/{id}/reopen:
    post:
      operationId: reopenDecision
      tags: [decisions]
      summary: Reopen a resolved or cancelled decision (owner or PM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionReopenInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/invitations:
    get:
      operationId: listInvitations
      tags: [admin]
      summary: List invitations (PM only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invitation"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createInvitation
      tags: [admin]
      summary: Create and send an invitation (PM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/invitations/{id}:
    delete:
      operationId: revokeInvitation
      tags: [admin]
      summary: Revoke a pending invitation (PM only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: No content

  /admin/invitations/{id}/resend:
    post:
      operationId: resendInvitation
      tags: [admin]
      summary: Resend an invitation email (PM only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"

  /admin/audit-log:
    get:
      operationId: listAdminAuditLog
      tags: [admin]
      summary: List recent admin audit log entries (PM only)
      parameters:
        - name: action
          in: query
          required: false
          schema: { type: string }
        - name: actor
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminAuditLogEntry"

  /admin/roles:
    get:
      operationId: listAdminRoles
      tags: [admin]
      summary: List role definitions with member counts (PM only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminRole"

  /admin/roles/{id}:
    patch:
      operationId: updateRole
      tags: [admin]
      summary: Update a role definition (description/label/sortOrder, PM only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleUpdateInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRole"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned URL to upload a file to object storage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrl"

components:
